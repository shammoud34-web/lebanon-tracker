<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lebanon Incident Tracker</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.5.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.0/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #f8fafc;
    }
    header h1 span { color: #ef4444; }
    #status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #94a3b8;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: blink 2s infinite;
    }
    #status-dot.loading { background: #eab308; box-shadow: 0 0 6px #eab308; }
    #status-dot.error   { background: #ef4444; box-shadow: 0 0 6px #ef4444; animation: none; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── Menu toggle (mobile only) ── */
    #menu-toggle {
      display: none;
      background: none;
      border: none;
      color: #e2e8f0;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      margin-right: 10px;
      line-height: 1;
    }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ── Sidebar overlay (mobile) ── */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 19;
    }
    #sidebar-overlay.visible { display: block; }

    /* ── Sidebar ── */
    aside {
      width: 300px;
      flex-shrink: 0;
      background: #0f172a;
      border-right: 1px solid #1e293b;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Sidebar close button (mobile only) ── */
    #sidebar-close {
      display: none;
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 20px;
      cursor: pointer;
      padding: 2px 6px;
      line-height: 1;
      margin-left: auto;
      flex-shrink: 0;
    }
    #sidebar-close:hover { color: #e2e8f0; }
    .sidebar-top {
      padding: 14px 14px 10px;
      border-bottom: 1px solid #1e293b;
    }
    #search {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      margin-bottom: 10px;
    }
    #search::placeholder { color: #475569; }
    #search:focus { border-color: #3b82f6; }

    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #64748b; color: #e2e8f0; }
    .filter-btn.active { color: #0f172a; border-color: transparent; }
    .filter-btn[data-sev="all"].active      { background: #475569; color: #f8fafc; }
    .filter-btn[data-sev="critical"].active { background: #ef4444; }
    .filter-btn[data-sev="high"].active     { background: #f97316; }
    .filter-btn[data-sev="medium"].active   { background: #eab308; color: #1e293b; }

    .sidebar-count {
      padding: 8px 14px;
      font-size: 11px;
      color: #475569;
      border-bottom: 1px solid #1e293b;
    }

    #incident-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    #incident-list::-webkit-scrollbar { width: 4px; }
    #incident-list::-webkit-scrollbar-track { background: transparent; }
    #incident-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .list-item {
      padding: 10px 14px;
      border-bottom: 1px solid #1e293b;
      cursor: pointer;
      transition: background 0.1s;
    }
    .list-item:hover    { background: #1e293b; }
    .list-item.selected { background: #1e293b; border-left: 3px solid #3b82f6; padding-left: 11px; }
    .list-item-top {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      margin-bottom: 4px;
    }
    .sev-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .sev-critical { background: #7f1d1d; color: #fca5a5; }
    .sev-high     { background: #7c2d12; color: #fdba74; }
    .sev-medium   { background: #713f12; color: #fcd34d; }

    .list-item-title {
      font-size: 12px;
      font-weight: 500;
      color: #cbd5e1;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .list-item-meta {
      font-size: 11px;
      color: #475569;
      display: flex;
      gap: 6px;
    }
    .empty {
      padding: 30px 14px;
      text-align: center;
      color: #475569;
      font-size: 13px;
    }

    /* ── Map ── */
    #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; }

    /* ── Map controls overlay ── */
    #style-toggle, #flights-toggle, #history-toggle {
      position: absolute;
      top: 10px;
      z-index: 5;
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #style-toggle   { right: 50px; }
    #flights-toggle { right: 140px; }
    #history-toggle { right: 240px; }
    #style-toggle:hover, #flights-toggle:hover, #history-toggle:hover { background: #1e293b; }
    #flights-toggle.active  { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
    #history-toggle.active  { background: #1a2e1a; border-color: #22c55e; color: #86efac; }

    /* ── Chart panel ── */
    #chart-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 240px;
      background: rgba(15,23,42,0.96);
      border-top: 1px solid #1e293b;
      z-index: 8;
      display: none;
      flex-direction: column;
      padding: 10px 16px 8px;
      backdrop-filter: blur(4px);
    }
    #chart-panel.visible { display: flex; }
    #chart-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      flex-shrink: 0;
    }
    #chart-panel-header h3 {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #chart-type-btns { display: flex; gap: 6px; }
    .chart-type-btn {
      padding: 3px 9px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: transparent;
      color: #64748b;
      font-size: 11px;
      cursor: pointer;
    }
    .chart-type-btn.active { background: #1e293b; color: #e2e8f0; border-color: #475569; }
    #chart-close {
      background: none; border: none; color: #475569;
      font-size: 16px; cursor: pointer; padding: 0 4px;
    }
    #chart-close:hover { color: #e2e8f0; }
    #chart-canvas-wrap { flex: 1; min-height: 0; position: relative; }

    /* ── ACLED legend ── */
    #acled-legend {
      position: absolute;
      bottom: 14px; left: 14px;
      z-index: 9;
      background: rgba(15,23,42,0.9);
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 8px 12px;
      display: none;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
    }
    #acled-legend.visible { display: flex; }
    .legend-row { display: flex; align-items: center; gap: 6px; color: #94a3b8; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Refresh bar ── */
    #refresh-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: #3b82f6;
      transition: width 1s linear;
      z-index: 10;
      pointer-events: none;
    }

    /* ── Mapbox popup overrides ── */
    .mapboxgl-popup-content {
      background: #1e293b !important;
      color: #e2e8f0 !important;
      border: 1px solid #334155;
      border-radius: 10px !important;
      padding: 14px 16px !important;
      max-width: 260px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    }
    .mapboxgl-popup-tip { display: none !important; }
    .mapboxgl-popup-close-button {
      color: #475569 !important;
      font-size: 16px !important;
      right: 8px !important;
      top: 6px !important;
    }
    .mapboxgl-popup-close-button:hover { color: #e2e8f0 !important; background: none !important; }
    .popup-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-block;
      margin-bottom: 8px;
    }
    .popup-title {
      font-size: 13px;
      font-weight: 600;
      color: #f8fafc;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .popup-meta {
      font-size: 11px;
      color: #64748b;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .popup-meta span { color: #94a3b8; }

    /* ── Mobile ── */
    @media (max-width: 767px) {
      header { padding: 10px 14px; }
      header h1 { font-size: 14px; }

      #menu-toggle { display: block; }

      aside {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: 85%;
        max-width: 300px;
        z-index: 20;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        border-right: none;
        box-shadow: 4px 0 20px rgba(0,0,0,0.5);
      }
      aside.open { transform: translateX(0); }

      #sidebar-close { display: block; }

      .sidebar-top { padding: 12px; }
      #sidebar-close { display: block; margin-bottom: 8px; }
      #search { margin-bottom: 8px; }
      .filters { flex-wrap: wrap; }

      .mapboxgl-popup-content { max-width: calc(100vw - 40px) !important; }
      #history-toggle { right: 190px; }
      #chart-panel { height: 200px; }
      #acled-legend { bottom: 210px; }
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;">
    <button id="menu-toggle" aria-label="Open sidebar">☰</button>
    <h1>Lebanon <span>Incident</span> Tracker</h1>
  </div>
  <div id="status">
    <div id="status-dot" class="loading"></div>
    <span id="status-text">Loading…</span>
  </div>
</header>

<div class="layout">
  <div id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside>
    <div class="sidebar-top">
      <button id="sidebar-close" aria-label="Close sidebar">×</button>
      <input id="search" type="text" placeholder="Search incidents…" autocomplete="off">
      <div class="filters">
        <button class="filter-btn active" data-sev="all">All</button>
        <button class="filter-btn" data-sev="critical">Critical</button>
        <button class="filter-btn" data-sev="high">High</button>
        <button class="filter-btn" data-sev="medium">Medium</button>
      </div>
    </div>
    <div class="sidebar-count" id="sidebar-count">—</div>
    <div id="incident-list"></div>
  </aside>

  <!-- Map container -->
  <div style="position:relative; flex:1; overflow:hidden;">
    <div id="map"></div>
    <button id="history-toggle">📊 History</button>
    <button id="flights-toggle">✈ Flights</button>
    <button id="style-toggle">🛰 Satellite</button>
    <div id="refresh-bar" style="width:100%"></div>

    <!-- ACLED legend -->
    <div id="acled-legend">
      <div class="legend-row"><div class="legend-dot" style="background:#ef4444"></div>Battles</div>
      <div class="legend-row"><div class="legend-dot" style="background:#f97316"></div>Explosions</div>
      <div class="legend-row"><div class="legend-dot" style="background:#eab308"></div>Violence vs Civilians</div>
      <div class="legend-row"><div class="legend-dot" style="background:#3b82f6"></div>Protests</div>
      <div class="legend-row"><div class="legend-dot" style="background:#a855f7"></div>Riots</div>
      <div class="legend-row"><div class="legend-dot" style="background:#94a3b8"></div>Other</div>
    </div>

    <!-- Chart panel -->
    <div id="chart-panel">
      <div id="chart-panel-header">
        <h3>Lebanon Historical Events &amp; Fatalities</h3>
        <div style="display:flex;align-items:center;gap:10px;">
          <div id="chart-type-btns">
            <button class="chart-type-btn active" data-type="political_violence">Political Violence</button>
            <button class="chart-type-btn" data-type="civilian_targeting">Civilian Targeting</button>
          </div>
          <button id="chart-close">×</button>
        </div>
      </div>
      <div id="chart-canvas-wrap">
        <canvas id="chart-canvas"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'https://lebanon-tracker-production.up.railway.app';
  const REFRESH_SECS = 300;
  const DARK_STYLE = 'mapbox://styles/mapbox/dark-v11';
  const SAT_STYLE  = 'mapbox://styles/mapbox/satellite-streets-v12';

  const SEV_COLOR = { critical: '#ef4444', high: '#f97316', medium: '#eab308' };

  let map;
  let allIncidents = [];
  let filtered = [];
  let activeSev = 'all';
  let searchQ = '';
  let selectedId = null;
  let activePopup = null;
  let isDark = true;
  let countdownInterval;
  let secsLeft = REFRESH_SECS;
  let mapReady = false;

  // ── Bootstrap: fetch config then init map ─────────────
  async function init() {
    const config = await fetch(`${API}/config`).then(r => r.json());
    mapboxgl.accessToken = config.mapboxToken;

    map = new mapboxgl.Map({
      container: 'map',
      style: DARK_STYLE,
      center: [35.86, 33.85],
      zoom: 8,
      attributionControl: false,
    });

    map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'top-right');
    map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-right');

    map.on('error', (e) => console.error('Mapbox error:', e));

    map.on('load', () => {
      mapReady = true;
      setTimeout(() => map.resize(), 100);
      addLayers();
      fetchIncidents();
    });

    // Re-add layers after style change
    map.on('style.load', () => {
      if (mapReady) {
        addLayers();
        updateMapSource();
        if (flightsEnabled) setTimeout(() => { addFlightsLayer(); fetchFlights(); }, 50);
        if (historyEnabled) setTimeout(() => { addAcledLayer(); fetchAcledEvents(); }, 50);
      }
    });
  }

  init();

  // ── Mobile sidebar toggle ─────────────────────────────
  function openSidebar() {
    document.querySelector('aside').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('visible');
  }
  function closeSidebar() {
    document.querySelector('aside').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('visible');
  }
  document.getElementById('menu-toggle').addEventListener('click', openSidebar);
  document.getElementById('sidebar-close').addEventListener('click', closeSidebar);
  document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);

  // ── GeoJSON source + layers ───────────────────────────
  function addLayers() {
    if (map.getSource('incidents')) return;

    map.addSource('incidents', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [] },
      cluster: true,
      clusterMaxZoom: 14,
      clusterRadius: 30,
    });

    // Cluster circles
    map.addLayer({
      id: 'clusters',
      type: 'circle',
      source: 'incidents',
      filter: ['has', 'point_count'],
      paint: {
        'circle-color': [
          'step', ['get', 'point_count'],
          '#334155', 5,
          '#475569', 15,
          '#64748b'
        ],
        'circle-radius': ['step', ['get', 'point_count'], 18, 5, 24, 15, 30],
        'circle-stroke-width': 2,
        'circle-stroke-color': '#94a3b8',
      },
    });

    // Cluster count label
    map.addLayer({
      id: 'cluster-count',
      type: 'symbol',
      source: 'incidents',
      filter: ['has', 'point_count'],
      layout: {
        'text-field': '{point_count_abbreviated}',
        'text-font': ['DIN Offc Pro Medium', 'Arial Unicode MS Bold'],
        'text-size': 12,
      },
      paint: { 'text-color': '#f8fafc' },
    });

    // Individual incident points
    map.addLayer({
      id: 'unclustered-point',
      type: 'circle',
      source: 'incidents',
      filter: ['!', ['has', 'point_count']],
      paint: {
        'circle-radius': 8,
        'circle-color': [
          'match', ['get', 'severity'],
          'critical', '#ef4444',
          'high',     '#f97316',
          'medium',   '#eab308',
          '#94a3b8'
        ],
        'circle-stroke-width': 2,
        'circle-stroke-color': '#0f172a',
        'circle-opacity': 0.9,
      },
    });

    // Pulse ring for selected
    map.addLayer({
      id: 'selected-ring',
      type: 'circle',
      source: 'incidents',
      filter: ['==', ['get', 'id'], ''],
      paint: {
        'circle-radius': 14,
        'circle-color': 'transparent',
        'circle-stroke-width': 2,
        'circle-stroke-color': '#3b82f6',
      },
    });

    // Click cluster → always show full list popup; zoom in if not yet at expansion zoom
    map.on('click', 'clusters', e => {
      const features = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
      if (!features.length) return;
      const feature = features[0];
      const clusterId = feature.properties.cluster_id;
      const coords = feature.geometry.coordinates;
      const source = map.getSource('incidents');

      // Fetch all leaves first, then decide on zoom
      source.getClusterLeaves(clusterId, 500, 0, (err, leaves) => {
        if (err || !leaves) return;

        // Zoom in if needed so the cluster starts to break apart
        source.getClusterExpansionZoom(clusterId, (err2, zoom) => {
          if (!err2 && zoom > map.getZoom() + 0.5) {
            map.easeTo({ center: coords, zoom });
          }
        });

        if (activePopup) activePopup.remove();
        const SEV_ORDER = { critical: 0, high: 1, medium: 2 };
        leaves.sort((a, b) => (SEV_ORDER[a.properties.severity] ?? 9) - (SEV_ORDER[b.properties.severity] ?? 9));
        const rows = leaves.map(l => {
          const p = l.properties;
          const badgeBg    = { critical: '#7f1d1d', high: '#7c2d12', medium: '#713f12' }[p.severity] || '#1e293b';
          const badgeColor = { critical: '#fca5a5', high: '#fdba74', medium: '#fcd34d' }[p.severity] || '#94a3b8';
          return `<div style="padding:6px 0;border-bottom:1px solid #334155;cursor:pointer" data-id="${esc(p.id)}">
            <span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;background:${badgeBg};color:${badgeColor};text-transform:uppercase;margin-right:5px">${esc(p.severity)}</span>
            <span style="font-size:11px;color:#cbd5e1">${esc((p.desc || p.name || '').substring(0, 70))}${(p.desc || '').length > 70 ? '…' : ''}</span>
            <div style="font-size:10px;color:#475569;margin-top:2px">${esc(p.name)} · ${esc(p.date)}</div>
          </div>`;
        }).join('');
        activePopup = new mapboxgl.Popup({ closeButton: true, maxWidth: '300px', offset: 12 })
          .setLngLat(coords)
          .setHTML(`
            <div>
              <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">${leaves.length} incidents here</div>
              <div style="max-height:240px;overflow-y:auto">${rows}</div>
            </div>`)
          .addTo(map);
        activePopup.getElement().querySelectorAll('[data-id]').forEach(el => {
          el.addEventListener('click', () => {
            selectItem(el.dataset.id, false);
            if (activePopup) { activePopup.remove(); activePopup = null; }
          });
        });
        activePopup.on('close', () => { activePopup = null; clearSelected(); });
      });
    });

    // Click point → popup
    map.on('click', 'unclustered-point', e => {
      const props = e.features[0].properties;
      const coords = e.features[0].geometry.coordinates.slice();
      openPopup(props, coords);
      selectItem(props.id, false);
    });

    // Cursor styles
    map.on('mouseenter', 'clusters', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'clusters', () => { map.getCanvas().style.cursor = ''; });
    map.on('mouseenter', 'unclustered-point', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'unclustered-point', () => { map.getCanvas().style.cursor = ''; });
  }

  function toGeoJSON(incidents) {
    return {
      type: 'FeatureCollection',
      features: incidents.map(i => ({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [i.lng, i.lat] },
        properties: {
          id: i.id, severity: i.sev, desc: i.desc,
          name: i.name, date: i.date, src: i.src,
        },
      })),
    };
  }

  function updateMapSource() {
    const src = map.getSource('incidents');
    if (src) src.setData(toGeoJSON(filtered));
  }

  // ── Popup ────────────────────────────────────────────
  function openPopup(props, coords) {
    if (activePopup) activePopup.remove();
    const color = SEV_COLOR[props.severity] || '#94a3b8';
    const badgeBg = { critical: '#7f1d1d', high: '#7c2d12', medium: '#713f12' }[props.severity] || '#1e293b';
    const badgeColor = { critical: '#fca5a5', high: '#fdba74', medium: '#fcd34d' }[props.severity] || '#94a3b8';

    activePopup = new mapboxgl.Popup({ closeButton: true, maxWidth: '280px', offset: 12 })
      .setLngLat(coords)
      .setHTML(`
        <div>
          <div class="popup-badge" style="background:${badgeBg};color:${badgeColor}">${props.severity}</div>
          <div class="popup-title">${esc(props.desc)}</div>
          <div class="popup-meta">
            <div>📍 <span>${esc(props.name)}</span></div>
            <div>📅 <span>${esc(props.date)}</span></div>
            <div>🔗 <span>${esc(props.src)}</span></div>
          </div>
        </div>
      `)
      .addTo(map);

    activePopup.on('close', () => {
      activePopup = null;
      clearSelected();
    });
  }

  // ── Fetch ────────────────────────────────────────────
  async function fetchIncidents() {
    setStatus('loading', 'Fetching…');
    try {
      const res = await fetch(`${API}/incidents`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      allIncidents = (json.data || []).filter(i => i.lat && i.lng);
      applyFilters();
      const t = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      setStatus('ok', `${allIncidents.length} incidents · ${t}`);
    } catch (err) {
      setStatus('error', 'Failed to load');
      console.error(err);
    }
    startCountdown();
  }

  function setStatus(state, text) {
    const dot = document.getElementById('status-dot');
    dot.className = state === 'ok' ? '' : state;
    document.getElementById('status-text').textContent = text;
  }

  // ── Filters ──────────────────────────────────────────
  function applyFilters() {
    filtered = allIncidents.filter(i => {
      const sevOk = activeSev === 'all' || i.sev === activeSev;
      const q = searchQ.toLowerCase();
      const searchOk = !q
        || (i.desc || '').toLowerCase().includes(q)
        || (i.name || '').toLowerCase().includes(q)
        || (i.src  || '').toLowerCase().includes(q);
      return sevOk && searchOk;
    });
    renderList();
    updateMapSource();
    document.getElementById('sidebar-count').textContent =
      `${filtered.length} of ${allIncidents.length} incidents`;
  }

  // ── Sidebar list ─────────────────────────────────────
  function renderList() {
    const el = document.getElementById('incident-list');
    if (!filtered.length) {
      el.innerHTML = '<div class="empty">No incidents match your filters.</div>';
      return;
    }
    el.innerHTML = filtered.map(i => `
      <div class="list-item ${i.id === selectedId ? 'selected' : ''}" data-id="${i.id}">
        <div class="list-item-top">
          <span class="sev-badge sev-${i.sev}">${i.sev}</span>
          <span class="list-item-title">${esc(i.desc || i.name)}</span>
        </div>
        <div class="list-item-meta">
          <span>${esc(i.name)}</span>
          <span>·</span>
          <span>${esc(i.date)}</span>
          <span>·</span>
          <span>${esc(i.src)}</span>
        </div>
      </div>
    `).join('');

    el.querySelectorAll('.list-item').forEach(row => {
      row.addEventListener('click', () => {
        selectItem(row.dataset.id, true);
        closeSidebar();
      });
    });
  }

  function selectItem(id, flyTo) {
    selectedId = id;
    renderList();

    // Highlight ring on map
    if (map.getLayer('selected-ring')) {
      map.setFilter('selected-ring', ['==', ['get', 'id'], id]);
    }

    const inc = filtered.find(i => i.id === id);
    if (!inc) return;

    if (flyTo) {
      map.flyTo({ center: [inc.lng, inc.lat], zoom: Math.max(map.getZoom(), 12), speed: 1.4 });
      // open popup after fly
      map.once('moveend', () => {
        openPopup({ severity: inc.sev, desc: inc.desc, name: inc.name, date: inc.date, src: inc.src, id: inc.id },
                  [inc.lng, inc.lat]);
      });
    }

    // Scroll list item into view
    const row = document.querySelector(`.list-item[data-id="${id}"]`);
    if (row) row.scrollIntoView({ block: 'nearest' });
  }

  function clearSelected() {
    selectedId = null;
    renderList();
    if (map.getLayer('selected-ring')) {
      map.setFilter('selected-ring', ['==', ['get', 'id'], '']);
    }
  }

  // ── Style toggle ─────────────────────────────────────
  document.getElementById('style-toggle').addEventListener('click', () => {
    isDark = !isDark;
    map.setStyle(isDark ? DARK_STYLE : SAT_STYLE);
    document.getElementById('style-toggle').textContent = isDark ? '🛰 Satellite' : '🌙 Dark';
    if (activePopup) { activePopup.remove(); activePopup = null; }
  });

  // ── Filter buttons ───────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeSev = btn.dataset.sev;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (activePopup) { activePopup.remove(); activePopup = null; }
      applyFilters();
    });
  });

  document.getElementById('search').addEventListener('input', e => {
    searchQ = e.target.value;
    if (activePopup) { activePopup.remove(); activePopup = null; }
    applyFilters();
  });

  // ── Refresh countdown ────────────────────────────────
  function startCountdown() {
    clearInterval(countdownInterval);
    secsLeft = REFRESH_SECS;
    tick();
    countdownInterval = setInterval(() => {
      secsLeft--;
      tick();
      if (secsLeft <= 0) {
        clearInterval(countdownInterval);
        fetchIncidents();
      }
    }, 1000);
  }

  function tick() {
    document.getElementById('refresh-bar').style.width =
      ((secsLeft / REFRESH_SECS) * 100) + '%';
  }

  // ── Flights layer ─────────────────────────────────────
  const EMERGENCY_SQUAWKS = new Set(['7700', '7600', '7500']);
  const MILITARY_PREFIXES = ['RCH', 'CNV', 'FORTE', 'NATO', 'JAKE', 'IAF', 'USAF', 'REACH', 'LAGR', 'AZAZ', 'HOMER', 'MAGMA', 'DUKE', 'SPAR'];

  let flightsEnabled = false;
  let flightInterval = null;
  let flightPopup = null;

  function flightColor(f) {
    if (f.squawk && EMERGENCY_SQUAWKS.has(f.squawk)) return '#ef4444';
    if (!f.callsign || !f.squawk) return '#f97316';
    const cs = (f.callsign || '').toUpperCase();
    if (MILITARY_PREFIXES.some(p => cs.startsWith(p))) return '#f8fafc';
    return '#94a3b8';
  }

  function addFlightsLayer() {
    if (map.getSource('flights')) return;

    map.addSource('flights', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [] },
    });

    map.addLayer({
      id: 'flights-layer',
      type: 'symbol',
      source: 'flights',
      layout: {
        'text-field': '✈',
        'text-size': 18,
        'text-rotate': ['get', 'heading'],
        'text-rotation-alignment': 'map',
        'text-allow-overlap': true,
        'text-ignore-placement': true,
      },
      paint: {
        'text-color': ['get', 'color'],
        'text-halo-color': '#0f172a',
        'text-halo-width': 1.5,
      },
    });

    map.on('click', 'flights-layer', e => {
      const f = e.features[0].properties;
      const coords = e.features[0].geometry.coordinates.slice();
      if (flightPopup) flightPopup.remove();
      const altFt  = f.altitude ? Math.round(f.altitude * 3.28084).toLocaleString() + ' ft' : 'N/A';
      const spdKt  = f.velocity ? Math.round(f.velocity * 1.944) + ' kt' : 'N/A';
      const squawk = f.squawk || 'none';
      const label  = EMERGENCY_SQUAWKS.has(f.squawk) ? '🔴 EMERGENCY' : (!f.callsign || !f.squawk) ? '🟠 NO TRANSPONDER' : '⬜ MILITARY';
      flightPopup = new mapboxgl.Popup({ closeButton: true, maxWidth: '240px', offset: 12 })
        .setLngLat(coords)
        .setHTML(`
          <div>
            <div class="popup-badge" style="background:#1e293b;color:#93c5fd">${label}</div>
            <div class="popup-title">${esc(f.callsign || f.icao || 'Unknown')}</div>
            <div class="popup-meta">
              <div>✈ <span>ICAO: ${esc(f.icao)}</span></div>
              <div>⬆ <span>Alt: ${altFt}</span></div>
              <div>💨 <span>Speed: ${spdKt}</span></div>
              <div>📡 <span>Squawk: ${esc(squawk)}</span></div>
            </div>
          </div>
        `)
        .addTo(map);
    });

    map.on('mouseenter', 'flights-layer', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'flights-layer', () => { map.getCanvas().style.cursor = ''; });
  }

  function flightsToGeoJSON(flights) {
    return {
      type: 'FeatureCollection',
      features: flights.map(f => ({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [f.lng, f.lat] },
        properties: { ...f, color: flightColor(f) },
      })),
    };
  }

  async function fetchFlights() {
    try {
      const res = await fetch(`${API}/flights`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const src = map.getSource('flights');
      if (src) src.setData(flightsToGeoJSON(json.data || []));
      console.log(`[Flights] ${(json.data || []).length} aircraft`);
    } catch (err) {
      console.error('[Flights] fetch error:', err.message);
    }
  }

  document.getElementById('flights-toggle').addEventListener('click', () => {
    flightsEnabled = !flightsEnabled;
    const btn = document.getElementById('flights-toggle');
    btn.classList.toggle('active', flightsEnabled);
    btn.textContent = flightsEnabled ? '✈ Flights ON' : '✈ Flights';

    if (flightsEnabled) {
      addFlightsLayer();
      fetchFlights();
      flightInterval = setInterval(fetchFlights, 30000);
    } else {
      clearInterval(flightInterval);
      flightInterval = null;
      if (flightPopup) { flightPopup.remove(); flightPopup = null; }
      const src = map.getSource('flights');
      if (src) src.setData({ type: 'FeatureCollection', features: [] });
    }
  });

  // ── ACLED historical events layer ────────────────────
  const ACLED_COLORS = {
    'Battles':                    '#ef4444',
    'Explosions/Remote violence': '#f97316',
    'Violence against civilians': '#eab308',
    'Protests':                   '#3b82f6',
    'Riots':                      '#a855f7',
  };
  function acledColor(eventType) {
    return ACLED_COLORS[eventType] || '#94a3b8';
  }

  let historyEnabled = false;
  let acledMonthlyData = null;
  let activeChartType = 'political_violence';
  let chart = null;

  async function fetchAcledEvents() {
    try {
      const res = await fetch(`${API}/acled/events`);
      const json = await res.json();
      const src = map.getSource('acled-events');
      if (src) {
        src.setData({
          type: 'FeatureCollection',
          features: (json.data || []).map(e => ({
            type: 'Feature',
            geometry: { type: 'Point', coordinates: [e.lng, e.lat] },
            properties: {
              eventType: e.eventType,
              subEventType: e.subEventType,
              admin1: e.admin1,
              events: e.events,
              fatalities: e.fatalities,
              weekDate: e.weekDate,
              color: acledColor(e.eventType),
            },
          })),
        });
      }
    } catch (err) {
      console.error('[ACLED] fetch error:', err.message);
    }
  }

  function addAcledLayer() {
    if (map.getSource('acled-events')) return;
    map.addSource('acled-events', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [] },
    });
    map.addLayer({
      id: 'acled-events-layer',
      type: 'circle',
      source: 'acled-events',
      paint: {
        'circle-radius': ['interpolate', ['linear'], ['get', 'events'], 1, 4, 10, 8, 50, 14],
        'circle-color': ['get', 'color'],
        'circle-opacity': 0.6,
        'circle-stroke-width': 1,
        'circle-stroke-color': '#0f172a',
      },
    }, 'unclustered-point'); // insert below live incidents

    map.on('click', 'acled-events-layer', e => {
      const p = e.features[0].properties;
      const coords = e.features[0].geometry.coordinates.slice();
      if (activePopup) activePopup.remove();
      const date = new Date(p.weekDate).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
      activePopup = new mapboxgl.Popup({ closeButton: true, maxWidth: '240px', offset: 10 })
        .setLngLat(coords)
        .setHTML(`
          <div>
            <div class="popup-badge" style="background:#1e293b;color:${acledColor(p.eventType)}">${esc(p.eventType)}</div>
            <div class="popup-title">${esc(p.subEventType || p.eventType)}</div>
            <div class="popup-meta">
              <div>📍 <span>${esc(p.admin1)}</span></div>
              <div>📅 <span>${date}</span></div>
              <div>⚡ <span>${p.events} event${p.events !== 1 ? 's' : ''}, ${p.fatalities} fatal${p.fatalities !== 1 ? 'ities' : 'ity'}</span></div>
            </div>
          </div>
        `)
        .addTo(map);
      activePopup.on('close', () => { activePopup = null; });
    });
    map.on('mouseenter', 'acled-events-layer', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'acled-events-layer', () => { map.getCanvas().style.cursor = ''; });
  }

  document.getElementById('history-toggle').addEventListener('click', async () => {
    historyEnabled = !historyEnabled;
    const btn = document.getElementById('history-toggle');
    btn.classList.toggle('active', historyEnabled);
    btn.textContent = historyEnabled ? '📊 History ON' : '📊 History';
    document.getElementById('acled-legend').classList.toggle('visible', historyEnabled);
    document.getElementById('chart-panel').classList.toggle('visible', historyEnabled);

    if (historyEnabled) {
      addAcledLayer();
      fetchAcledEvents();
      if (!acledMonthlyData) {
        const res = await fetch(`${API}/acled/monthly`);
        const json = await res.json();
        acledMonthlyData = json.data || [];
      }
      renderChart(activeChartType);
      setTimeout(() => map.resize(), 50);
    } else {
      const src = map.getSource('acled-events');
      if (src) src.setData({ type: 'FeatureCollection', features: [] });
      if (chart) { chart.destroy(); chart = null; }
      setTimeout(() => map.resize(), 50);
    }
  });

  document.getElementById('chart-close').addEventListener('click', () => {
    document.getElementById('chart-panel').classList.remove('visible');
    if (chart) { chart.destroy(); chart = null; }
    setTimeout(() => map.resize(), 50);
  });

  document.querySelectorAll('.chart-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeChartType = btn.dataset.type;
      document.querySelectorAll('.chart-type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderChart(activeChartType);
    });
  });

  function renderChart(type) {
    if (!acledMonthlyData) return;
    const rows = acledMonthlyData
      .filter(r => r.dataType === type)
      .sort((a, b) => a.year !== b.year ? a.year - b.year : a.monthIndex - b.monthIndex);

    const labels = rows.map(r => `${r.month.slice(0,3)} ${r.year}`);
    const events = rows.map(r => r.events);
    const fatalities = rows.map(r => r.fatalities);

    if (chart) chart.destroy();
    const ctx = document.getElementById('chart-canvas').getContext('2d');
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: 'Events',
            data: events,
            backgroundColor: 'rgba(59,130,246,0.5)',
            borderColor: '#3b82f6',
            borderWidth: 1,
            yAxisID: 'y',
          },
          {
            label: 'Fatalities',
            data: fatalities,
            type: 'line',
            borderColor: '#ef4444',
            backgroundColor: 'rgba(239,68,68,0.15)',
            borderWidth: 2,
            pointRadius: 0,
            fill: true,
            tension: 0.3,
            yAxisID: 'y1',
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12 },
          },
          tooltip: {
            backgroundColor: '#1e293b',
            titleColor: '#f8fafc',
            bodyColor: '#94a3b8',
            borderColor: '#334155',
            borderWidth: 1,
          },
        },
        scales: {
          x: {
            ticks: {
              color: '#475569', font: { size: 9 },
              maxRotation: 45,
              callback: (val, i) => i % 6 === 0 ? labels[i] : '',
            },
            grid: { color: '#1e293b' },
          },
          y: {
            position: 'left',
            ticks: { color: '#3b82f6', font: { size: 10 } },
            grid: { color: '#1e293b' },
            title: { display: true, text: 'Events', color: '#3b82f6', font: { size: 10 } },
          },
          y1: {
            position: 'right',
            ticks: { color: '#ef4444', font: { size: 10 } },
            grid: { drawOnChartArea: false },
            title: { display: true, text: 'Fatalities', color: '#ef4444', font: { size: 10 } },
          },
        },
      },
    });
  }

  // ── Helpers ──────────────────────────────────────────
  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
